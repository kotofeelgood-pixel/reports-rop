name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-lftp-${{ runner.os }}-${{ hashFiles('.github/workflows/deploy.yml') }}
          restore-keys: apt-lftp-${{ runner.os }}-

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends lftp

      - name: Deploy to server via SFTP
        env:
          SFTP_USER: ${{ secrets.FTP_USER }}
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_PORT: ${{ secrets.FTP_PORT }}
          SFTP_DIR: '/var/www/vueapp_itcen_usr/data/www/vueapp.itcenter.pro/reports-rop'
          LOCAL_DIR: ${{ github.workspace }}/.output/public
        run: |
          echo "Подключение к серверу ${SFTP_SERVER}:${SFTP_PORT}"
          echo "Пользователь: ${SFTP_USER}"
          echo "Целевая директория: ${SFTP_DIR}"
          echo "Локальная директория: ${LOCAL_DIR}"
          ls -la ${LOCAL_DIR}/
          lftp -u "${SFTP_USER}","${SFTP_PASSWORD}" -p "${SFTP_PORT}" sftp://"${SFTP_SERVER}" <<LFTP_EOF
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -oStrictHostKeyChecking=no"
          set cmd:fail-exit yes
          set ftp:list-options -a
          echo "Текущая директория на сервере:"
          pwd
          echo "Переход в целевую директорию: ${SFTP_DIR}"
          cd ${SFTP_DIR}
          echo "Текущая директория после перехода:"
          pwd
          echo "Содержимое целевой директории:"
          ls -la
          echo "Начало копирования файлов из ${LOCAL_DIR}"
          lcd ${LOCAL_DIR}
          !pwd
          !ls -la
          mirror --reverse --delete --verbose --exclude-glob .git* --exclude-glob node_modules* --exclude-glob .DS_Store . .
          echo "Содержимое после копирования:"
          ls -la
          quit
          LFTP_EOF
