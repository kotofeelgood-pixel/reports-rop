name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup LFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Create LFTP script
        run: |
          echo 'set sftp:auto-confirm yes' > /tmp/lftp_script.txt
          echo 'set sftp:connect-program "ssh -a -x -oStrictHostKeyChecking=no"' >> /tmp/lftp_script.txt
          echo 'set cmd:fail-exit yes' >> /tmp/lftp_script.txt
          echo 'set ftp:list-options -a' >> /tmp/lftp_script.txt
          echo 'cd /var/www/vueapp_itcen_usr/data/www/vueapp.itcenter.pro/report' >> /tmp/lftp_script.txt
          echo "lcd ${GITHUB_WORKSPACE}/dist" >> /tmp/lftp_script.txt
          echo 'mirror --reverse --delete --verbose --exclude-glob .git* --exclude-glob node_modules* --exclude-glob .DS_Store . .' >> /tmp/lftp_script.txt
          echo 'quit' >> /tmp/lftp_script.txt

      - name: Deploy to server via SFTP
        run: |
          lftp -u "vueapp_itcen_usr",",u{,%qpfHr|qH`1(" -p "22" sftp://"vueapp.itcenter.pro" -f /tmp/lftp_script.txt
